# Render Blueprint — Infrastructure as Code (docs/10-DEPLOYMENT.md, D-041).
#
# One committed file describes the production service. It is deliberately
# minimal for the Tier 0 launch: a single long-lived Node web service, no
# database and no secrets yet (nothing to leak). The Postgres instance,
# background workers, and cron jobs are ADDED to this same file when the
# database sprint (docs/09) arrives — the monolith gains workers without
# changing hosts (docs/10 §7). Commented stubs below show exactly where.
#
# The app is run as `next start` (not a static export) so the SSR/ISR door
# stays open for the DB era with zero migration — today every route simply
# prerenders static.

services:
  - type: web
    name: deepak-labs-web
    runtime: node
    plan: starter # free/starter is ample for a static personal site
    region: oregon
    branch: main

    # Monorepo: build + start delegate through the root workspace scripts.
    buildCommand: npm ci && npm run build
    startCommand: npm run start

    # The PaaS holds the previous good version if a new boot fails health.
    healthCheckPath: /

    # Owner triggers the FIRST deploy manually (docs/10 §8). Flip to `true`
    # after that succeeds to enable deploy-on-`main` (RELEASE_CHECKLIST §Deploy).
    autoDeploy: false

    envVars:
      - key: NODE_VERSION
        value: "20" # matches package.json engines (>=20)
      - key: NODE_ENV
        value: production
      # DATABASE_URL, LLM/embedding keys, etc. are added here (as synced
      # secrets, never committed) when docs/09 lands — see .env.example.

    # PR preview environments = the look-dev review surface (docs/10 §3,
    # RELEASE_CHECKLIST Gate 4). Ephemeral, auto-torn-down.
    previews:
      generation: automatic

